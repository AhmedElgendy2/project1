ID: northwind-app
_schema-version: '3.1'
version: 0.0.1

modules:
  - name: northwind-app
    type: html5
    path: .
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
    requires:
      - name: html5_repo_runtime

resources:
  - name: html5_repo_runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime